<main class="app-container">
  <h1>🧳 TravelPacker - Lista Bagagli</h1>

  <!-- Pannello Contatore e Barra di Progresso -->
  <div class="stats-container" *ngIf="totalItems > 0">
    <div class="stats-text">
      <span>Stato della valigia:</span>
      <strong>{{ packedItems }} di {{ totalItems }} oggetti pronti ({{ progressPercentage }}%)</strong>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" [style.width.%]="progressPercentage"></div>
    </div>

    <!-- AGGIUNTA: I tre pulsantini per i filtri e il comando svuota -->
    <div class="actions-toolbar">
      <div class="filter-buttons">
        <button (click)="currentFilter = 'all'" [class.active]="currentFilter === 'all'">Tutti</button>
        <button (click)="currentFilter = 'active'" [class.active]="currentFilter === 'active'">Da fare</button>
        <button (click)="currentFilter = 'packed'" [class.active]="currentFilter === 'packed'">In valigia</button>
      </div>
      <button class="btn-clear-all" (click)="clearAllItems()">Svuota</button>
    </div>
  </div>
  
  <app-packing-form (itemAdded)="addItem($event)"></app-packing-form>
  
  <!-- MODIFICA: Passiamo [items]="filteredItems" per attivare i filtri sullo schermo -->
  <app-packing-list 
    [items]="filteredItems"
    (togglePacked)="toggleItem($event)"
    (deleteItem)="removeItem($event)">
  </app-packing-list>
</main>
